# @package _global_

# ============================================================================
# MLM Pre-training Task Configuration (Full Scale)
# Stage 1 of DualRep two-stage training
# ============================================================================
# Thesis reference:
#   - Encoder: d_model=768, n_layer=8 (5 GCMB + 2 BiMamba + 1 FoPE attention)
#   - MLM: 15% masking, BERT-style (80% mask, 10% random, 10% keep)
#   - Output: Encoder weights for stage-2 fine-tuning
# ============================================================================

name: "mlm_pretrain_full_d768"

wandb:
  project: sf-fuse-ft
  group: "mlm-pretrain"
  job_type: pretraining
  mode: disabled
  name: ${name}
  save_dir: "."
  id: null

task:
  _target_: src.tasks.mlm_pretrain.MLMPretrainTask
  _recursive_: false

  # --- Encoder Configuration (Caduceus d_model=768) ---
  # Matches thesis Chapter 4 Wisteria encoder
  encoder_config:
    _name_: caduceus
    config:
      _target_: src.caduceus.configuration_caduceus.CaduceusConfig
      d_model: 768
      n_layer: 8
      vocab_size: 12
      d_intermediate: 1536  # 2x d_model

      # Module config
      n_modules: 1
      layers_per_module: 8
      conv_layers_per_module: 5
      attn_layer_in_module: 4
      dilation_base: 3
      dropout: 0.0

      # SSM Config (GCMB + BiMamba)
      ssm_cfg:
        d_state: 16
        d_conv: 4
        expand: 2
        dt_rank: "auto"
        dt_min: 0.001
        dt_max: 0.1
        dt_init: "random"
        dt_scale: 1.0
        dt_init_floor: 1e-4
        conv_bias: True
        bias: false
        use_fast_path: true

      # Attention Config (FoPE attention)
      attn_cfg:
        num_heads: 48  # 768/16=48, head_dim=16
        head_dim: 16
        mlp_dim: 768
        qkv_proj_bias: false
        out_proj_bias: True
        use_flash_attn: false
        dropout: 0.0

      # Caduceus Params
      bidirectional: true
      bidirectional_strategy: "add"
      bidirectional_weight_tie: true
      rcps: false

      # Fourier Position Embedding (covers full 131k input)
      use_fourier_pos_emb: true
      fourier_max_seq_len: 131072
      fourier_dim: null
      fourier_init: "eye_xavier_norm"

      # Gated Attention (enabled for thesis consistency)
      headwise_attn_output_gate: true
      elementwise_attn_output_gate: false

      # Init
      initializer_cfg:
        initializer_range: 0.02
        rescale_prenorm_residual: true
        n_residuals_per_layer: 1

  # --- Pre-training Options ---
  # Train all encoder layers (null = all layers)
  n_pretrain_layers: null

  # [MASK] token ID (must match dataset masking)
  mask_token_id: 5

  # Save HuggingFace format model after training
  save_hf_path: null

  # --- Optimizer & Scheduler ---
  optimizer_config:
    name: AdamW
    args:
      lr: 1e-3
      weight_decay: 0.01
      betas: [0.9, 0.999]

  scheduler_config:
    name: cosine_warmup
    warmup_steps: 2000
    min_lr: 1e-5

  # --- Dataset Configuration ---
  dataset:
    # Path to reference genome (FASTA .fa or pre-tokenized .h5)
    # Update this path to your hg38 genome file
    train_data_file: "/path/to/hg38.fa"
    # Validation data (optional)
    val_data_file: null

    # Sequence parameters
    seq_length: 131072  # Thesis: 131,072 bp input
    batch_size: 1
    num_workers: 4

    # MLM masking parameters (Thesis: 15% masking, BERT-style)
    mask_prob: 0.15
    mask_token_prob: 0.8  # 80% mask
    random_token_prob: 0.1  # 10% random
    # Note: 10% keep is implicit (1 - 0.8 - 0.1)

    # Sampling parameters
    train_samples_per_epoch: 10000
    val_samples_per_epoch: 1000

    # Genome filtering (FASTA mode)
    min_chr_length: 1000000
    exclude_chr: "chrM,chrUn,chrEBV,_random,_alt,_fix"
    max_n_ratio: 0.1

    # H5 mode (if using pre-tokenized data)
    h5_seq_key: "sequences"

# Trainer config for MLM pretraining
trainer:
  _target_: pytorch_lightning.Trainer
  accelerator: gpu
  devices: 8  # 8 GPUs recommended for d_model=768
  strategy: auto
  num_nodes: 1
  min_epochs: 1
  max_epochs: 100
  enable_model_summary: true
  log_every_n_steps: 50
  precision: bf16
  gradient_clip_val: 0.5
  accumulate_grad_batches: 1
  check_val_every_n_epoch: 99999  # Use callback for step-based validation
  limit_train_batches: null
  limit_val_batches: null
  max_steps: 200000  # Adjust based on dataset size

callbacks:
  # Validate periodically during training
  val_every_n_global_steps:
    enabled: true
    every_n_steps: 40000  # Validate every 40k steps
  # Keep essential callbacks
  learning_rate_monitor:
    _target_: pytorch_lightning.callbacks.LearningRateMonitor
    logging_interval: step
  params:
    _target_: src.callbacks.params.ParamsLog
    total: true
    trainable: true
    fixed: true
  timer:
    _target_: src.callbacks.timer.Timer
    step: true
    inter_step: false
    epoch: true
    val: true
  rich_progress_bar:
    _target_: pytorch_lightning.callbacks.RichProgressBar
    refresh_rate: 1
  rich_model_summary:
    _target_: pytorch_lightning.callbacks.RichModelSummary
    max_depth: 3
  model_checkpoint_best:
    _target_: pytorch_lightning.callbacks.ModelCheckpoint
    dirpath: "checkpoints/"
    filename: "best"
    monitor: "val/loss"
    mode: "min"
    save_top_k: 1
    save_last: false
    auto_insert_metric_name: false
    verbose: true
    save_on_train_epoch_end: false
  model_checkpoint_last:
    _target_: pytorch_lightning.callbacks.ModelCheckpoint
    dirpath: "checkpoints/"
    filename: "last"
    monitor: null
    mode: "min"
    save_top_k: 1
    save_last: false
    auto_insert_metric_name: false
    verbose: true
    every_n_train_steps: 1000
    save_on_train_epoch_end: false
