# @package _global_

# ============================================================================
# SF-Fuse Fine-Tuning with CNN Stem Downsampling
# ============================================================================
# Architecture:
#   Input tokens (B, 131072)
#   → CNN Stem [128x downsampling via 7 stages of 2x]
#   → (B, 1024, d_model)
#   → Caduceus Encoder (short sequence processing)
#   → (B, 1024, d_model)
#   → Simple Head [crop to 896 + MLP]
#   → (B, 896, 5313)
#
# Key advantage: The encoder processes 1024 tokens instead of 131072,
# dramatically reducing compute and memory requirements.
# ============================================================================

task:
  _target_: src.tasks.sf_fuse_cnn_stem_ft.SFFuseCNNStemTask
  _recursive_: false

  # --- CNN Stem Configuration ---
  # Downsamples input from 131072 → 1024 (128x) via 7 stages of 2x
  stem_config:
    vocab_size: 12            # DNA vocabulary size (auto-updated from pretrained)
    d_model: 256              # Output dim (auto-updated from pretrained encoder)
    stem_channels: null       # null = use d_model for all stages
    num_downsample_stages: 7  # 2^7 = 128x total downsampling
    kernel_size: 5            # Conv kernel size in residual blocks
    initial_kernel_size: 15   # Wide kernel for initial feature extraction
    dropout: 0.1              # Dropout in conv blocks

  # --- Encoder Configuration (DNA-LM Backbone) ---
  # Same Caduceus backbone, but processes much shorter sequences (~1024)
  # NOTE: fourier_max_seq_len is auto-adjusted to match downsampled length
  encoder_config:
    _name_: caduceus
    config:
      _target_: src.caduceus.configuration_caduceus.CaduceusConfig
      d_model: 256
      n_layer: 8
      vocab_size: 12
      d_intermediate: 512
      
      # Module config
      n_modules: 1
      layers_per_module: 8
      conv_layers_per_module: 5
      attn_layer_in_module: 4
      dilation_base: 3
      dropout: 0.0
      
      # SSM Config
      ssm_cfg:
        d_state: 16
        d_conv: 4
        expand: 2
        dt_rank: "auto"
        dt_min: 0.001
        dt_max: 0.1
        dt_init: "random"
        dt_scale: 1.0
        dt_init_floor: 1e-4
        conv_bias: True
        bias: false
        use_fast_path: true
      
      # Attention Config
      attn_cfg:
        num_heads: 16
        head_dim: null
        mlp_dim: 256
        qkv_proj_bias: false
        out_proj_bias: True
        use_flash_attn: false
        dropout: 0.0

      # Caduceus Params
      bidirectional: true
      bidirectional_strategy: "add"
      bidirectional_weight_tie: true
      rcps: false
      
      # Positional Embeddings
      # NOTE: fourier_max_seq_len is auto-overridden to ~2048 (2x downsampled seq len)
      # since the encoder now processes sequences of length ~1024
      use_fourier_pos_emb: true
      fourier_max_seq_len: 2048  # For downsampled sequences
      fourier_dim: null
      fourier_init: "eye_xavier_norm"
      
      # Gated Attention (from gated_attention paper)
      headwise_attn_output_gate: false
      elementwise_attn_output_gate: false
      
      # Init
      initializer_cfg:
        initializer_range: 0.02
        rescale_prenorm_residual: true
        n_residuals_per_layer: 1

  # --- Head Configuration (Simple Projection) ---
  # No pooling needed - CNN stem handles all downsampling
  head_config:
    d_model: 256              # Auto-updated from encoder
    num_tracks: 5313          # Human tracks (1643 for mouse)
    hidden_dim: 512           # MLP hidden dim (auto: 2 * d_model)
    target_len: 896           # SF-Fuse target bins
    dropout: 0.4

  # --- Optimizer & Scheduler ---
  optimizer_config:
    name: AdamW
    args:
      lr: 5e-4
      weight_decay: 0.01

  scheduler_config:
    name: cosine_warmup
    warmup_steps: 1000
    min_lr: 1e-6

  # --- Training Strategy ---
  freeze_encoder: False
  pretrained_ckpt_path: null

  # --- Data Configuration ---
  dataset:
    train_data_file: "./data/raw/human_train.h5"
    train_targets_file: null
    val_data_file: "./data/raw/human_valid.h5"
    val_targets_file: null
    seq_key: "sequences"
    tgt_key: "targets"
    batch_size: 1
    num_workers: 4
    max_length: 131072
