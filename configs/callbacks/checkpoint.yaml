# Checkpoint callbacks configuration
# 
# This file provides alternative checkpoint configurations that can be used
# by adding `- callbacks/checkpoint` to the defaults list in config.yaml
#
# Note: By default, config.yaml uses its own inline checkpoint configuration.
# To use these configs instead, modify config.yaml's defaults section.

# Best Model Checkpoint - saves model with best validation metric
model_checkpoint:
  _target_: pytorch_lightning.callbacks.ModelCheckpoint
  monitor: ${train.monitor}
  mode: ${train.mode}
  save_top_k: 1
  save_last: false
  dirpath: "checkpoints/"
  filename: "best"
  auto_insert_metric_name: false
  verbose: true
  save_on_train_epoch_end: false  # Important: save on validation end

# Periodic Checkpoint - saves every N training steps for resuming
model_checkpoint_every_n_steps:
  _target_: pytorch_lightning.callbacks.ModelCheckpoint
  monitor: null
  mode: "min"
  save_top_k: 1
  save_last: false
  dirpath: "checkpoints/"
  filename: "last"
  auto_insert_metric_name: false
  verbose: true
  every_n_train_steps: 1000
  save_on_train_epoch_end: false
